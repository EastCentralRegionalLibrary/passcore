name: Docker Build Validation

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            passcore:ci-test
            ghcr.io/${{ github.repository_owner }}/passcore:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        run: |
          docker run -d -p 8080:80 --name passcore_test passcore:ci-test
          sleep 20
          docker ps
          docker logs passcore_test --tail 50

      - name: Smoke test HTTP endpoint
        run: |
          curl -f http://localhost:8080 || (docker logs passcore_test && exit 1)

      - name: Cleanup test container
        if: always()
        run: |
          docker rm -f passcore_test || true
