name: CI - Testing

on:
  workflow_dispatch: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal --framework net8.0

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: src/Unosquare.PassCore.Web/ClientApp/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: src/Unosquare.PassCore.Web/ClientApp

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      working-directory: src/Unosquare.PassCore.Web/ClientApp

    - name: Build Backend (Debug)
      run: dotnet build src/Unosquare.PassCore.Web/Unosquare.PassCore.Web.csproj -c Debug -f net8.0

    - name: Start Backend
      run: |
        ASPNETCORE_ENVIRONMENT=Test ASPNETCORE_URLS=http://localhost:5000 dotnet run --project src/Unosquare.PassCore.Web/Unosquare.PassCore.Web.csproj --configuration Debug --framework net8.0 --no-build &
      env:
        ASPNETCORE_ENVIRONMENT: Test
        ASPNETCORE_URLS: http://localhost:5000

    - name: Wait for Backend
      run: |
        timeout 60s bash -c 'until curl -f http://localhost:5000/api/password; do sleep 5; done'

    - name: Run E2E Tests
      run: npx playwright test
      working-directory: src/Unosquare.PassCore.Web/ClientApp

    - name: Upload Playwright Report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: src/Unosquare.PassCore.Web/ClientApp/playwright-report/
        retention-days: 30

    - name: Upload Test Results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: src/Unosquare.PassCore.Web/ClientApp/test-results/
        retention-days: 30
