name: CI - Testing

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      ASPNETCORE_ENVIRONMENT: Test
      ASPNETCORE_URLS: http://localhost:5000

    steps:
      - uses: actions/checkout@v6

      # -------------------------
      # Tooling setup
      # -------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Unosquare.PassCore.Web/ClientApp/package-lock.json

      # -------------------------
      # Backend build + tests
      # -------------------------
      - name: Restore .NET dependencies
        run: dotnet restore --property:PASSCORE_PROVIDER=DEBUG

      - name: Build Backend (Debug)
        run: |
          dotnet build --configuration Debug --property:PASSCORE_PROVIDER=DEBUG --no-restore

      - name: Run Backend Tests
        run: dotnet test --no-build --verbosity normal --property:PASSCORE_PROVIDER=DEBUG

      # -------------------------
      # Frontend setup
      # -------------------------
      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/Unosquare.PassCore.Web/ClientApp

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/Unosquare.PassCore.Web/ClientApp

      # -------------------------
      # Start backend (no rebuild!)
      # -------------------------
      - name: Start Backend
        shell: bash
        run: |
          dotnet run \
            --project src/Unosquare.PassCore.Web/Unosquare.PassCore.Web.csproj \
            --configuration Debug \
            --framework net8.0 \
            --property:PASSCORE_PROVIDER=DEBUG \
            --no-build &

          echo $! > backend.pid

      - name: Wait for Backend to be ready
        run: |
          echo "Waiting for backend..."
          timeout 90s bash -c '
            until curl -fsS http://localhost:5000/api/password; do
              sleep 3
            done
          '

      # -------------------------
      # E2E Tests
      # -------------------------
      - name: Run Playwright E2E Tests
        run: npx playwright test
        working-directory: src/Unosquare.PassCore.Web/ClientApp

      # -------------------------
      # Cleanup (always!)
      # -------------------------
      - name: Stop Backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi

      # -------------------------
      # Artifacts on failure
      # -------------------------
      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Unosquare.PassCore.Web/ClientApp/playwright-report
          retention-days: 7

      - name: Upload Playwright Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: src/Unosquare.PassCore.Web/ClientApp/test-results
          retention-days: 7
