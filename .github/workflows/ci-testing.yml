name: CI - Testing

on:
  workflow_dispatch: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal --framework net8.0

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: src/Unosquare.PassCore.Web/ClientApp/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: src/Unosquare.PassCore.Web/ClientApp

    - name: Lint
      run: npm run lint
      working-directory: src/Unosquare.PassCore.Web/ClientApp

    - name: Build
      run: npm run build
      working-directory: src/Unosquare.PassCore.Web/ClientApp
