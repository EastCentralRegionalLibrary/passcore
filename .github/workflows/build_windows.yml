name: Build Windows Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*' # Trigger workflow on tags like v1.0.0, v2.0.1, etc.

jobs:
  build:
    name: Windows Binaries on Windows Latest
    runs-on: windows-latest

    steps:
    - name: Cancel previous runs
      if: ${{ github.ref != 'refs/heads/main' }}
      uses: styfle/cancel-workflow-action@0.12.1
      with:
        access_token: ${{ github.token }}

    - name: Checkout Code
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup .NET 8.0 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Node
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Extract version and repo info
      if: startsWith(github.ref, 'refs/tags/v')
      id: vars
      shell: pwsh
      run: |
        $tagName = "${{ github.ref_name }}"
        $version = $tagName.TrimStart('v')
        $repoName = "${{ github.repository }}".Split('/')[-1]
        
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "tag_name=$tagName" >> $env:GITHUB_OUTPUT
        echo "repo_name=$repoName" >> $env:GITHUB_OUTPUT

    - name: Set package.json version
      if: startsWith(github.ref, 'refs/tags/v')
      working-directory: ./ClientApp
      run: npm version ${{ steps.vars.outputs.version }}

    - name: Build and Publish Windows Binaries
      shell: pwsh
      run: |
        # restore the line below if we need to fall back to VS2019
        # $env:path="C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\SDK\ScopeCppSDK\vc15\VC\bin\;$env:path"
        
        dotnet publish --configuration Release --runtime win-x64 --self-contained false --output ".\passcore_output\"
        Get-ChildItem -Path ".\passcore_output\"

    - name: Upload Binaries
      uses: actions/upload-artifact@v4.6.0
      with:
        name: passcore-${{ steps.vars.outputs.version || 'latest' }}
        path: ${{ github.workspace }}\passcore_output\
