name: Build Windows Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*' # Trigger workflow on tags like v1.0.0, v2.0.1, etc.

jobs:
  build:
    permissions:
      contents: read      # Needed to check out code
      actions: write      # Needed for cancel-workflow-action to stop old runs
    name: Windows Binaries on Windows Latest
    runs-on: windows-latest

    steps:
    - name: Cancel previous runs
      if: ${{ github.ref != 'refs/heads/main' }}
      uses: styfle/cancel-workflow-action@0.13.1
      with:
        access_token: ${{ github.token }}

    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup .NET 10.0 SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 22 # Plan move to 24 if dependencies support it
        cache: npm
        cache-dependency-path: |
          src/Unosquare.PassCore.Web/ClientApp/package-lock.json


    - name: Extract version and repo info
      if: startsWith(github.ref, 'refs/tags/v')
      id: vars
      shell: pwsh
      run: |
        $tagName = "${{ github.ref_name }}"
        $version = $tagName.TrimStart('v')
        $repoName = "${{ github.repository }}".Split('/')[-1]
        
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "tag_name=$tagName" >> $env:GITHUB_OUTPUT
        echo "repo_name=$repoName" >> $env:GITHUB_OUTPUT

    - name: Set package.json version
      if: startsWith(github.ref, 'refs/tags/v')
      working-directory: ./ClientApp
      run: npm version ${{ steps.vars.outputs.version }}

    - name: Build and Publish Windows Binaries
      shell: pwsh
      run: |
        dotnet publish .\src\Unosquare.PassCore.Web\Unosquare.PassCore.Web.csproj --configuration Release --runtime win-x64 --framework net8.0-windows --self-contained false --output ".\passcore_output"
        Get-ChildItem -Path ".\passcore_output"

    - name: Upload Binaries
      uses: actions/upload-artifact@v7
      with:
        name: passcore-${{ steps.vars.outputs.version || 'latest' }}
        path: .\passcore_output
