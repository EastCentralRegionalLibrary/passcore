version: '3.8'

services:
  passcore-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Test
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "5000:5000"
    volumes:
      - ./src/Unosquare.PassCore.Web/appsettings.Test.json:/app/appsettings.Test.json
